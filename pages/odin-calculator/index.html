<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Audiowide&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />
    <script src="./script.js" defer></script>
    <title>Calculator</title>
  </head>
  <body>
    <main>
      <div class="container">
        <div class="display">
          <p id="expression"></p>
          <p id="current"></p>
        </div>
        <div class="buttons">
          <div class="buttons__actions">
            <button class="btn action" id="on" data-type="action">
              ON/OFF
            </button>
            <button
              class="btn action"
              id="all-clear"
              data-type="action"
              disabled
            >
              AC
            </button>
            <button class="btn action" id="delete" data-type="action" disabled>
              DEL
            </button>
            <button class="btn action" id="result" data-type="equals" disabled>
              =
            </button>
          </div>
          <div class="buttons__num">
            <button
              class="btn number"
              data-type="number"
              data-value="1"
              disabled
            >
              1
            </button>
            <button
              class="btn number"
              data-type="number"
              data-value="2"
              disabled
            >
              2
            </button>
            <button
              class="btn number"
              data-type="number"
              data-value="3"
              disabled
            >
              3
            </button>
            <button
              class="btn number"
              data-type="number"
              data-value="4"
              disabled
            >
              4
            </button>
            <button
              class="btn number"
              data-type="number"
              data-value="5"
              disabled
            >
              5
            </button>
            <button
              class="btn number"
              data-type="number"
              data-value="6"
              disabled
            >
              6
            </button>
            <button
              class="btn number"
              data-type="number"
              data-value="7"
              disabled
            >
              7
            </button>
            <button
              class="btn number"
              data-type="number"
              data-value="8"
              disabled
            >
              8
            </button>
            <button
              class="btn number"
              data-type="number"
              data-value="9"
              disabled
            >
              9
            </button>
            <button
              class="btn number"
              data-type="number"
              data-value="."
              disabled
            >
              .
            </button>
            <button
              class="btn number"
              data-type="number"
              data-value="0"
              disabled
            >
              0
            </button>
            <button
              class="btn number"
              data-type="number"
              data-value="00"
              disabled
            >
              00
            </button>
          </div>
          <div class="buttons__operators">
            <button
              class="btn operator"
              id="add"
              data-type="operator"
              data-value="+"
              disabled
            >
              +
            </button>
            <button
              class="btn operator"
              id="substract"
              data-type="operator"
              data-value="-"
              disabled
            >
              -
            </button>
            <button
              class="btn operator"
              id="multiply"
              data-type="operator"
              data-value="*"
              disabled
            >
              ×
            </button>
            <button
              class="btn operator"
              id="divide"
              data-type="operator"
              data-value="/"
              disabled
            >
              ÷
            </button>
          </div>
        </div>
      </div>
      <div class="help">
        <p>'Space' - On / Off</p>
        <p>'Escape' - All clear</p>
        <p>'Backspace' - Clear last operand</p>
        <p>'=' - Calculate</p>
        <p>'+', '-', '/', '*' - Choose operator</p>
        <p>1, 2, 3, 4, 5, 6, 7, 8, 9, 0 - Enter number</p>
      </div>
    </main>
  </body>
</html>
