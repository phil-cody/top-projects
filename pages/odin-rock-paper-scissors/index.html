<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="./image/favicon.png" />
    <script src="./script.js" defer></script>
    <link rel="stylesheet" href="./style.css" />
    <title>Rock | Paper | Scissors</title>
  </head>
  <body>
    <a href="../../index.html" class="home-btn">
      <button>
          <p>
            <span><</span>
            <span><</span>
            home
          </p>
      </button>
    </a>
    <div class="container">
      <section class="hero">
        <h1 class="title">Rock | Paper | Scissors</h1>
      </section>
      <section class="game">
        <div class="choice">
          <h2 class="subtitle">Choose your fighter</h2>
          <button id="rock" class="btn">🪨</button>
          <button id="paper" class="btn">🧻</button>
          <button id="scissors" class="btn">✂️</button>
        </div>
        <div class="result">
          <p class="result__round-number">Ready to start?</p>
        </div>
        <div class="restart">
          <button id="restart__button" class="btn">Start over</button>
        </div>
      </section>
    </div>
  </body>
</html>
